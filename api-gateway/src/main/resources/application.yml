server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://localhost:5174"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
            exposedHeaders:
              - Authorization

      routes:
        # ── AUTH SERVICE ─────────────────────────────────────────────
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**,/oauth2/**,/login/oauth2/**

        # ── PROVIDER SERVICE ─────────────────────────────────────────
        - id: provider-service
          uri: lb://provider-service
          predicates:
            - Path=/providers/**

        # ── SLOT SERVICE ─────────────────────────────────────────────
        - id: slot-service
          uri: lb://slot-service
          predicates:
            - Path=/slots/**

        # ── APPOINTMENT SERVICE ───────────────────────────────────────
        - id: appointment-service
          uri: lb://appointment-service
          predicates:
            - Path=/appointments/**

        # ── PAYMENT SERVICE ───────────────────────────────────────────
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/payments/**

        # ── NOTIFICATION SERVICE ──────────────────────────────────────
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/notifications/**

        # ── REVIEW SERVICE ────────────────────────────────────────────
        - id: review-service
          uri: lb://review-service
          predicates:
            - Path=/reviews/**

        # ── RECORD SERVICE ────────────────────────────────────────────
        - id: record-service
          uri: lb://record-service
          predicates:
            - Path=/records/**

# Eureka registration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# JWT secret — must match auth-service
jwt:
  secret: medibook_super_secret_key_2026_very_long_string_min_256_bits

logging:
  level:
    org.springframework.cloud.gateway: INFO
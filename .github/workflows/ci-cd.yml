name: MediBook CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build eureka-server
      run: cd eureka-server && mvn clean package -DskipTests

    - name: Build api-gateway
      run: cd api-gateway && mvn clean package -DskipTests

    - name: Build auth-service
      run: cd auth-service && mvn clean package -DskipTests

    - name: Build provider-service
      run: cd provider-service && mvn clean package -DskipTests

    - name: Build slot-service
      run: cd slot-service && mvn clean package -DskipTests

    - name: Build appointment-service
      run: cd appointment-service && mvn clean package -DskipTests

    - name: Build payment-service
      run: cd payment-service && mvn clean package -DskipTests

    - name: Build notification-service
      run: cd notification-service && mvn clean package -DskipTests

    - name: Build review-service
      run: cd review-service && mvn clean package -DskipTests

    - name: Build record-service
      run: cd record-service && mvn clean package -DskipTests

    - name: Build and push Docker images
      run: docker compose build